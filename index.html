<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COPIÓN NIVEL DIOS - SECURE</title>
    <style>
        @import url('https://googleapis.com');
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Press Start 2P',cursive;text-align:center;background:#050510;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

        /* Pantalla de Bloqueo */
        #lock-screen {
            background: #1c2128;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #e94560;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(233,69,96,0.2);
            z-index: 200;
        }
        input { padding: 12px; border-radius: 5px; border: none; width: 80%; margin-bottom: 15px; text-align: center; outline: none; background: #0d1117; color: white; border: 1px solid #30363d; font-family: inherit; font-size: 10px; }
        .btn-lock { padding: 12px 25px; background: #e94560; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #fff; font-family: inherit; font-size: 10px; }

        #juego{ display:none; background:linear-gradient(145deg,#1a1a2e,#16213e); max-width:700px; width:95%; padding:25px; border:5px solid #e94560; border-radius:20px; position:relative; box-shadow:0 0 50px rgba(233,69,96,0.5)}

        #pantallaInicio{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(26,26,46,0.98);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:15px}

        #stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;background:rgba(0,0,0,0.5);padding:15px;border-radius:12px;border:2px solid #444}
        .stat-box p {font-size:8px; color:#e94560; margin-bottom:8px; font-weight:bold}
        .stat {font-size:12px; color:#ffd700; text-shadow:1px 1px #000}

        #mesa{background:linear-gradient(#8B4513,#A0522D);height:320px;margin:15px 0;position:relative;border:5px solid #4d260b;border-radius:15px;box-shadow:inset 0 0 50px rgba(0,0,0,0.5)}
        #profe{font-size:65px;top:20px;position:absolute;left:50%;transform:translateX(-50%);z-index:10;transition: 0.1s}

        #contenedorSospecha{position:absolute;top:95px;left:50%;transform:translateX(-50%);width:150px;height:18px;background:#222;border:3px solid #fff;border-radius:10px;display:none;z-index:11;overflow:hidden}
        #barraSospecha{width:0%;height:100%;background:#00ff00;transition: 0.1s;}

        button{font-family:'Press Start 2P',cursive;font-size:10px;padding:12px;margin:5px;border:4px solid #e94560;border-radius:10px;background:#16213e;color:#e94560;cursor:pointer;transition:0.2s}
        .seleccionado{background:#e94560 !important;color:#fff !important;}

        #controlesActivos{display:none;gap:15px;margin-top:15px}
        #copiarBtn{flex-grow:3;font-size:14px;background:#e94560;color:white; user-select: none;}
        
        .mirando{transform:translateX(-50%) scale(1.4) rotate(10deg)!important;filter:drop-shadow(0 0 25px red)}
        #alumno{font-size:65px;position:absolute;bottom:15px;left:50%;transform:translateX(-50%)}

        #diploma{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center;padding:20px}
        #diplomaCont{background:#fff;color:#000;padding:40px;border:10px double #d4af37;border-radius:10px;text-align:center;}
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO -->
<div id="lock-screen">
    <h2 style="color: #e94560; font-size: 14px; margin-bottom: 20px;">🔐 ACCESO COPIÓN</h2>
    <input type="password" id="pass-input" placeholder="CÓDIGO VIP">
    <br>
    <button class="btn-lock" onclick="checkPass()">ENTRAR AL AULA</button>
</div>

<!-- JUEGO -->
<div id="juego">
    <div id="pantallaInicio">
        <h2 style="color:#ffd700; font-size:16px; margin-bottom:30px;">DIFICULTAD</h2>
        <div id="selectorDificultad">
            <button class="dificultad" onclick="setDificultad('facil', this)">FÁCIL</button>
            <button class="dificultad" onclick="setDificultad('medio', this)">MEDIO</button>
            <button class="dificultad" onclick="setDificultad('dificil', this)">DIFÍCIL</button>
        </div>
        <button id="btnPlay" onclick="iniciarJuego()" style="display:none; margin-top:40px; border-color:#00ff00; color:#00ff00; font-size:12px;">EMPEZAR</button>
        <p style="font-size: 8px; margin-top: 20px; color: #aaa;">Récord: <span id="recordGlobal">0</span></p>
    </div>

    <div id="stats">
        <div class="stat-box"><p>PTS</p><div class="stat" id="puntos">0</div></div>
        <div class="stat-box"><p>VIDAS</p><div class="stat" id="vidas">3</div></div>
        <div class="stat-box"><p>TIME</p><div class="stat" id="tiempo">60</div></div>
        <div class="stat-box"><p>COMBO</p><div class="stat" id="combo">x1</div></div>
        <div class="stat-box"><p>RANK</p><div class="stat" id="rango">F</div></div>
    </div>

    <div id="mesa">
        <div id="profe">👨‍🏫</div>
        <div id="contenedorSospecha"><div id="barraSospecha"></div></div>
        <div id="alumno">🧑‍🎓</div>
    </div>

    <div id="mensaje" style="font-size:10px; height:30px; color:#ffd700; margin-top: 10px;">¡ELIGE NIVEL!</div>

    <div id="controlesActivos">
        <button id="copiarBtn" onmousedown="empezarCopiar()" onmouseup="pararCopiar()" ontouchstart="empezarCopiar()" ontouchend="pararCopiar()">COPIAR [ESPACIO]</button>
        <button onclick="togglePausa()">PAUSA</button>
    </div>
</div>

<div id="diploma">
    <div id="diplomaCont">
        <h1 style="font-size:25px; color:#d4af37;">RESULTADOS</h1>
        <p style="font-size:12px; margin:20px 0;">Puntuación Final:</p>
        <p style="font-size:20px; color:#e94560;" id="puntosFinales"></p>
        <button onclick="location.reload()" style="background:#000; color:#fff; margin-top:30px;">REINTENTAR</button>
    </div>
</div>

<script>
let puntos = 0, vidas = 3, tiempo = 60, combo = 1, dificultad = "";
let juegoActivo = false, pausado = false, estaMirando = false, estaCopiando = false, sospecha = 0;
let ptsPorTick = 0, subidaBase = 0;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// Récord
document.getElementById('recordGlobal').innerText = localStorage.getItem('copion_save') || 0;

function checkPass() {
    if (document.getElementById('pass-input').value === "pc2024") {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('juego').style.display = 'block';
    } else {
        alert("Código incorrecto.");
    }
}

document.getElementById('pass-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPass(); });

function sonar(f, t, v) {
    try {
        let osc = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = f; g.gain.setValueAtTime(v, audioCtx.currentTime);
        osc.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + t);
        osc.stop(audioCtx.currentTime + t);
    } catch(e){}
}

function setDificultad(d, btn) {
    dificultad = d;
    if (d === 'facil') { ptsPorTick = 6; subidaBase = 0.6; }
    else if (d === 'medio') { ptsPorTick = 18; subidaBase = 1.8; }
    else if (d === 'dificil') { ptsPorTick = 35; subidaBase = 3.5; }
    document.querySelectorAll('.dificultad').forEach(b => b.classList.remove('seleccionado'));
    btn.classList.add('seleccionado');
    document.getElementById('btnPlay').style.display = 'block';
}

function iniciarJuego() {
    juegoActivo = true;
    document.getElementById('pantallaInicio').style.display = 'none';
    document.getElementById('controlesActivos').style.display = 'flex';
    document.getElementById('contenedorSospecha').style.display = 'block';
    bucle();
    setInterval(() => {
        if(juegoActivo && !pausado) {
            tiempo--;
            document.getElementById('tiempo').innerText = tiempo;
            if(tiempo <= 0) finalizar();
        }
    }, 1000);
}

function empezarCopiar() { if(juegoActivo && !pausado) estaCopiando = true; }
function pararCopiar() { estaCopiando = false; }

window.addEventListener('keydown', (e) => { if(e.code === 'Space') empezarCopiar(); });
window.addEventListener('keyup', (e) => { if(e.code === 'Space') pararCopiar(); });

function bucle() {
    if(!juegoActivo) return;
    if(!pausado) {
        if(!estaMirando) {
            sospecha += (Math.random() * subidaBase);
            if(sospecha >= 100) girarProfe();
        }
        document.getElementById('barraSospecha').style.width = sospecha + "%";
        if(estaCopiando) {
            if(estaMirando) pillado();
            else {
                puntos += (ptsPorTick * combo / 10);
                actualizarUI();
            }
        }
    }
    setTimeout(bucle, 100);
}

function girarProfe() {
    estaMirando = true;
    document.getElementById('profe').classList.add('mirando');
    let t = dificultad === 'dificil' ? 800 : 1500;
    setTimeout(() => {
        estaMirando = false;
        sospecha = 0;
        document.getElementById('profe').classList.remove('mirando');
    }, t + Math.random() * 1000);
}

function pillado() {
    estaCopiando = false;
    vidas--;
    sospecha = 0;
    document.getElementById('vidas').innerText = vidas;
    document.getElementById('mensaje').innerText = "¡TE VIO!";
    if(vidas <= 0) finalizar();
}

function actualizarUI() {
    const p = Math.floor(puntos);
    document.getElementById('puntos').innerText = p;
    combo = 1 + Math.floor(p / 1000);
    document.getElementById('combo').innerText = "x" + combo;
}

function finalizar() {
    juegoActivo = false;
    const finalScore = Math.floor(puntos);
    document.getElementById('puntosFinales').innerText = finalScore;
    document.getElementById('diploma').style.display = 'flex';
    let rec = localStorage.getItem('copion_save') || 0;
    if(finalScore > rec) localStorage.setItem('copion_save', finalScore);
}

function togglePausa() { pausado = !pausado; }
</script>
</body>
</html>
